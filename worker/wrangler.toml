name = "momentarily-held"
main = "src/index.ts"
compatibility_date = "2026-05-13"
account_id = "REDACTED"

# Cron trigger — fires every 5 min, matching the MTA alerts feed cadence.
[triggers]
crons = ["*/5 * * * *"]

# feed.momentarily.nyc is served BY the Worker, not bound directly to R2.
# The Worker's fetch handler gates reads to the v1/ prefix; state/ and archive/
# stay private. Provisioning this requires the R2 bucket's direct custom-domain
# binding to be removed first (Cloudflare dashboard) — otherwise the deploy
# fails on a hostname conflict.
[[routes]]
pattern = "feed.momentarily.nyc"
custom_domain = true

# R2 bucket — the Worker uses this binding to read (public v1/) and write
# (all keys). The bucket is NOT publicly exposed; only the Worker route is.
[[r2_buckets]]
binding = "MOMENTARILY"
bucket_name = "momentarily"

# Observability — keep logs available for tail/inspect during early iterations.
[observability]
enabled = true
head_sampling_rate = 1
