name: Train HMM (nightly)

# Retrain per-route HMM params from the trailing 14-day R2 alerts archive.
# Writes state/params.json + state/params/v<epoch>.json. The live Worker picks
# up the new params on its next cron tick. Because trained_at changes every
# run, the Worker resets every route's alpha filter (see worker/src/index.ts
# paramsChanged path) — that's a system-wide ~5-min "warming up" window after
# each successful training run. Tune cron cadence accordingly.

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC daily (~midnight EST). GHA cron is best-effort.
  workflow_dispatch:      # manual trigger for testing / one-off retrains
    inputs:
      dry_run:
        description: "Print learned params instead of writing to R2"
        type: boolean
        default: false

concurrency:
  group: train-em
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --frozen
      - name: Run EM trainer
        run: uv run python -m training.train_em --days 14 ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          MURK_KEY: ${{ secrets.MURK_KEY }}
      # Retention: bucket creds are object-scoped (no R2 lifecycle rules), so
      # pruning rides the nightly job instead. Failures here shouldn't mask a
      # successful training run.
      - name: Prune aged R2 objects
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        run: uv run python -m training.prune
        env:
          MURK_KEY: ${{ secrets.MURK_KEY }}
